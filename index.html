        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        #app {

            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        .header {

        .header h1 {

            margin-bottom: 8px;
        }

        .start-date-section {
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .start-date-section label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 600;
            white-space: nowrap;
        }

        .start-date-input {
            flex: 1;
            padding: 8px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 6px;
            color: #22d3ee;
            font-size: 12px;
            font-weight: 600;
        }

        .start-date-input:focus {
            outline: none;
            border-color: #22d3ee;
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.2);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(34, 211, 238, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #06b6d4 0%, #0284c7 100%);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 11px;
            color: #94a3b8;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px;
            padding-bottom: 20px;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .task:active {
            transform: scale(0.98);
        }

        .task.completed {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .task.completed .task-title {
            color: #86efac;
            text-decoration: line-through;
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(34, 211, 238, 0.4);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
        }

        .task.completed .task-checkbox {
            background: #22d3ee;
            border-color: #22d3ee;
        }

        .task-meta {
            flex: 1;
        }

        .task-title {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .task-date {
            font-size: 12px;
            color: #94a3b8;
        }

        .task-status {
            font-size: 10px;
            padding: 4px 8px;
            background: rgba(34, 211, 238, 0.1);
            color: #22d3ee;
            border-radius: 4px;
            white-space: nowrap;
        }

        .task.completed .task-status {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
        }

        .task-content {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(34, 211, 238, 0.1);
        }

        .task.expanded .task-content {
            display: block;
        }

        .task-description {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

            flex-wrap: wrap;

        let tasks = [];
        let completedTasks = [];
        let startDate = null;

        function loadData() {
            const saved = localStorage.getItem('cyberAuthorityTimeline');
            if (saved) {
                const data = JSON.parse(saved);
                completedTasks = data.completedTasks || [];
                startDate = data.startDate;
                document.getElementById('startDate').value = startDate || new Date().toISOString().split('T')[0];
                updateTimeline();
            } else {
                const today = new Date().toISOString().split('T')[0];
                startDate = today;
                document.getElementById('startDate').value = today;
                updateTimeline();
            }
        }

        function saveData() {
            localStorage.setItem('cyberAuthorityTimeline', JSON.stringify({completedTasks, startDate}));
        }

        function updateTimeline() {
            const input = document.getElementById('startDate').value;
            if (!input) return;

            startDate = input;
            const start = new Date(startDate + 'T00:00:00');

            tasks = baseTimeline.map(task => ({
                ...task,
                actualDate: new Date(start.getTime() + task.daysFromStart * 24 * 60 * 60 * 1000).toISOString().split('T')[0]
            }));

            render();
            saveData();
        }

        function render() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            const today = new Date().toISOString().split('T')[0];
            let currentWeek = 0;
            let weekTasks = [];

            tasks.forEach(task => {
                if (task.week !== currentWeek) {
                    if (weekTasks.length > 0) {
                        addWeekSection(timeline, currentWeek, weekTasks);
                        weekTasks = [];
                    }
                    currentWeek = task.week;
                }

                weekTasks.push(task);
            });

            if (weekTasks.length > 0) {
                addWeekSection(timeline, currentWeek, weekTasks);
            }

            updateProgress();
        }

        function addWeekSection(parent, week, weekTasks) {
            const section = document.createElement('div');
            section.className = 'week-section';
            section.innerHTML = `<div class="week-title">Week ${week}</div>`;

            weekTasks.forEach(task => {
                const taskEl = createTaskElement(task);
                section.appendChild(taskEl);
            });

            parent.appendChild(section);
        }

        function createTaskElement(task) {
            const taskId = task.actualDate + '_' + task.title;
            const isCompleted = completedTasks.includes(taskId);
            const taskEl = document.createElement('div');
            taskEl.className = 'task' + (isCompleted ? ' completed' : '');

            const taskDate = new Date(task.actualDate + 'T00:00:00');
            const dateStr = taskDate.toLocaleDateString('en-US', {month: 'short', day: 'numeric'});

            let teamLabel = task.team === 'marketing' ? '👥' : task.team === 'you' ? '👤' : '📊';
            let statusHtml = `<div class="task-status">${teamLabel} ${task.type}</div>`;

            let actionsHTML = `<button class="task-btn" onclick="toggleTask('${taskId.replace(/'/g, "\\'")}')">${isCompleted ? 'Undo ↩️' : 'Done ✓'}</button>`;

            if (task.content) {
                actionsHTML = `<button class="task-btn" onclick="showModal('${task.title.replace(/'/g, "\\'")}', '${task.description.replace(/'/g, "\\'")}', \`${task.content.replace(/`/g, '\\`')}\`, ${task.isMetrics})">📖 View</button>` + actionsHTML;
            } else if (task.isMetrics) {
                actionsHTML = `<button class="task-btn" onclick="showMetricsModal('${task.title.replace(/'/g, "\\'")}', '${task.description.replace(/'/g, "\\'")}'")">📊 Log</button>` + actionsHTML;
            }

            taskEl.innerHTML = `
                <div class="task-header">
                    <div class="task-checkbox" onclick="toggleTask('${taskId.replace(/'/g, "\\'")}')">${isCompleted ? '✓' : ''}</div>
                    <div class="task-meta">
                        <div class="task-title">${task.title}</div>
                        <div class="task-date">${task.day} • ${dateStr}</div>
                    </div>
                    ${statusHtml}
                </div>
                <div class="task-content">
                    <div class="task-description">${task.description}</div>
                    <div class="task-actions">${actionsHTML}</div>
                </div>
            `;

            taskEl.addEventListener('click', (e) => {
                if (!e.target.closest('.task-btn') && !e.target.closest('.task-checkbox')) {
                    taskEl.classList.toggle('expanded');
                }
            });

            return taskEl;
        }

        function toggleTask(taskId) {
            if (completedTasks.includes(taskId)) {
                completedTasks = completedTasks.filter(id => id !== taskId);
            } else {
                completedTasks.push(taskId);
            }
            saveData();
            render();
        }

        function showModal(title, description, content, isMetrics) {
            const modal = document.getElementById('modal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').textContent = description;
            document.getElementById('contentSection').classList.toggle('hidden', isMetrics);
            document.getElementById('metricsSection').classList.toggle('hidden', !isMetrics);
            document.getElementById('copyBtn').classList.toggle('hidden', isMetrics);

            if (content && content.length > 0 && !isMetrics) {
                document.getElementById('contentTextarea').value = content;
            }

            if (isMetrics) {
                document.getElementById('metricsImpressions').value = '';
                document.getElementById('metricsLikes').value = '';
                document.getElementById('metricsComments').value = '';
                document.getElementById('metricsShares').value = '';
                document.getElementById('metricsFeedback').classList.add('hidden');
            }

            modal.classList.add('show');
        }

        function showMetricsModal(title, description) {
            showModal(title, description, '', true);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function copyContent() {
            const textarea = document.getElementById('contentTextarea');
            textarea.select();
            document.execCommand('copy');
            alert('✅ Copied!');
        }

        function calculateMetrics() {
            const impressions = parseInt(document.getElementById('metricsImpressions').value) || 0;
            const likes = parseInt(document.getElementById('metricsLikes').value) || 0;
            const comments = parseInt(document.getElementById('metricsComments').value) || 0;
            const shares = parseInt(document.getElementById('metricsShares').value) || 0;

            const feedback = document.getElementById('metricsFeedback');
            let message = '';
            let cssClass = '';

            if (impressions === 0) {
                message = '⏳ No impressions yet. Check again later.';
                cssClass = 'warning';
            } else {
                const engagement = ((likes + comments + shares) / impressions * 100).toFixed(2);
                
                if (engagement >= 3) {
                    message = `🔥 Great engagement! ${engagement}% - Keep this momentum!`;
                    cssClass = 'good';
                } else if (engagement >= 1.5) {
                    message = `✅ Good engagement: ${engagement}% - This is solid performance.`;
                    cssClass = 'good';
                } else if (engagement >= 0.5) {
                    message = `⚠️ Moderate engagement: ${engagement}% - Consider A/B testing different topics.`;
                    cssClass = 'warning';
                } else {
                    message = `📊 Low engagement: ${engagement}% - Try different timing or format.`;
                    cssClass = 'warning';
                }
            }

            feedback.textContent = message;
            feedback.className = 'metrics-feedback ' + cssClass;
            feedback.classList.remove('hidden');
        }

        function updateProgress() {
            const total = tasks.length;
            const completed = completedTasks.length;
            const percentage = total > 0 ? (completed / total) * 100 : 0;

            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `${completed} of ${total} tasks completed`;
        }

        document.getElementById('startDate').addEventListener('change', updateTimeline);
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        loadData();
    </script>
</body>
</html>
