<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cyber Authority">
    <meta name="apple-mobile-web-app-icon" content="logo.png">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <title>Cyber Authority Timeline</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        .header {
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(34, 211, 238, 0.2);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .start-date-section {
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .start-date-section label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 600;
            white-space: nowrap;
        }

        .start-date-input {
            flex: 1;
            padding: 8px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 6px;
            color: #22d3ee;
            font-size: 12px;
            font-weight: 600;
        }

        .start-date-input:focus {
            outline: none;
            border-color: #22d3ee;
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.2);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(34, 211, 238, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #06b6d4 0%, #0284c7 100%);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 11px;
            color: #94a3b8;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px;
            padding-bottom: 20px;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task:active {
            transform: scale(0.98);
        }

        .task.completed {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .task.completed .task-title {
            color: #86efac;
            text-decoration: line-through;
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(34, 211, 238, 0.4);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
        }

        .task.completed .task-checkbox {
            background: #22d3ee;
            border-color: #22d3ee;
        }

        .task-meta {
            flex: 1;
        }

        .task-title {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .task-date {
            font-size: 12px;
            color: #94a3b8;
        }

        .task-status {
            font-size: 10px;
            padding: 4px 8px;
            background: rgba(34, 211, 238, 0.1);
            color: #22d3ee;
            border-radius: 4px;
            white-space: nowrap;
        }

        .task.completed .task-status {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
        }

        .task-content {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(34, 211, 238, 0.1);
        }

        .task.expanded .task-content {
            display: block;
        }

        .task-description {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .task-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border: none;
            background: rgba(34, 211, 238, 0.1);
            color: #22d3ee;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-btn:active {
            background: rgba(34, 211, 238, 0.2);
        }

        .week-section {
            margin-bottom: 24px;
        }

        .week-title {
            font-size: 12px;
            font-weight: 700;
            color: #22d3ee;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 0 8px;
            border-bottom: 1px solid rgba(34, 211, 238, 0.2);
            margin-bottom: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #0f1729 0%, #1a1f3a 100%);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 16px;
            padding: 24px;
            max-width: 90vw;
            max-height: 85vh;
            overflow-y: auto;
            width: 100%;
            margin: auto;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #22d3ee;
        }

        .modal-body {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-break: break-word;
            background: rgba(15, 23, 42, 0.5);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid rgba(34, 211, 238, 0.1);
        }

        textarea, input[type="text"], input[type="number"], input[type="email"], input[type="url"] {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 12px;
        }

        textarea:focus, input:focus {
            border-color: #22d3ee;
            outline: none;
        }

        textarea {
            min-height: 150px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: #cbd5e1;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #0284c7 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(71, 85, 105, 0.5);
            color: #cbd5e1;
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .metrics-feedback {
            font-size: 12px;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            border: 1px solid rgba(34, 197, 94, 0.3);
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
        }

        .metrics-feedback.warning {
            border-color: rgba(251, 191, 36, 0.3);
            background: rgba(251, 191, 36, 0.1);
            color: #fcd34d;
        }

        .hidden {
            display: none !important;
        }

        .type-post { color: #22d3ee; }
        .type-marketing { color: #fbbf24; }
        .type-speaking { color: #ec4899; }
        .type-meeting { color: #8b5cf6; }
        .type-event { color: #f97316; }
        .type-branding { color: #06b6d4; }
        .type-analytics { color: #10b981; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🛡️ Cyber Authority</h1>
            
            <div class="start-date-section">
                <label>📅 Start:</label>
                <input type="date" id="startDate" class="start-date-input">
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text">
                <span id="progressText">0 of 0 tasks completed</span>
            </div>
        </div>

        <div class="content">
            <div class="timeline" id="timeline"></div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            
            <div id="contentSection" class="hidden">
                <label class="form-label">📋 Content:</label>
                <textarea id="contentTextarea" readonly></textarea>
            </div>

            <div id="metricsSection" class="hidden">
                <label class="form-label">👁️ Impressions:</label>
                <input type="number" id="metricsImpressions" placeholder="0">
                
                <label class="form-label">❤️ Likes:</label>
                <input type="number" id="metricsLikes" placeholder="0">
                
                <label class="form-label">💬 Comments:</label>
                <input type="number" id="metricsComments" placeholder="0">
                
                <label class="form-label">🔄 Shares:</label>
                <input type="number" id="metricsShares" placeholder="0">
                
                <button class="task-btn" onclick="calculateMetrics()" style="width: 100%; margin-bottom: 12px;">📊 Calculate</button>
                
                <div id="metricsFeedback" class="metrics-feedback hidden"></div>
            </div>

            <div id="speakingSection" class="hidden">
                <label class="form-label">🎤 Event Name:</label>
                <input type="text" id="speakingEvent" placeholder="Conference/Workshop name">
                
                <label class="form-label">📌 Topic:</label>
                <input type="text" id="speakingTopic" placeholder="Your talk topic">
                
                <label class="form-label">🔗 Link:</label>
                <input type="url" id="speakingLink" placeholder="https://...">
                
                <label class="form-label">✅ Notes:</label>
                <textarea id="speakingNotes" placeholder="Key points, Q&A, feedback..."></textarea>
                
                <button class="task-btn" onclick="saveSpeakingData()" style="width: 100%; margin-bottom: 12px;">💾 Save</button>
            </div>

            <div id="meetingSection" class="hidden">
                <label class="form-label">👤 CISO/Contact Name:</label>
                <input type="text" id="meetingName" placeholder="Name">
                
                <label class="form-label">🏢 Company:</label>
                <input type="text" id="meetingCompany" placeholder="Company name">
                
                <label class="form-label">📝 Topics Discussed:</label>
                <textarea id="meetingTopics" placeholder="Topics, outcomes, next steps..."></textarea>
                
                <button class="task-btn" onclick="saveMeetingData()" style="width: 100%; margin-bottom: 12px;">💾 Save</button>
            </div>

            <div id="brandingSection" class="hidden">
                <label class="form-label">🎨 Branding Task:</label>
                <textarea id="brandingDetails" placeholder="Design elements, messaging, visual identity..."></textarea>
                
                <button class="task-btn" onclick="saveBrandingData()" style="width: 100%; margin-bottom: 12px;">💾 Save</button>
            </div>

            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()">Close</button>
                <button class="btn-primary" id="copyBtn" onclick="copyContent()" class="hidden">📋 Copy</button>
            </div>
        </div>
    </div>

    <script>
        const baseTimeline = [

        let tasks = [];
        let completedTasks = [];
        let startDate = null;
        let savedData = {};

        function loadData() {
            const saved = localStorage.getItem('cyberAuthorityTimeline');
            if (saved) {
                const data = JSON.parse(saved);
                completedTasks = data.completedTasks || [];
                startDate = data.startDate;
                savedData = data.savedData || {};
                document.getElementById('startDate').value = startDate || new Date().toISOString().split('T')[0];
                updateTimeline();
            } else {
                const today = new Date().toISOString().split('T')[0];
                startDate = today;
                document.getElementById('startDate').value = today;
                updateTimeline();
            }
        }

        function saveData() {
            localStorage.setItem('cyberAuthorityTimeline', JSON.stringify({completedTasks, startDate, savedData}));
        }

        function updateTimeline() {
            const input = document.getElementById('startDate').value;
            if (!input) return;

            startDate = input;
            const start = new Date(startDate + 'T00:00:00');

            tasks = baseTimeline.map(task => ({
                ...task,
                actualDate: new Date(start.getTime() + task.daysFromStart * 24 * 60 * 60 * 1000).toISOString().split('T')[0]
            }));

            render();
            saveData();
        }

        function render() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            let currentWeek = 0;
            let weekTasks = [];

            tasks.forEach(task => {
                if (task.week !== currentWeek) {
                    if (weekTasks.length > 0) {
                        addWeekSection(timeline, currentWeek, weekTasks);
                        weekTasks = [];
                    }
                    currentWeek = task.week;
                }

                weekTasks.push(task);
            });

            if (weekTasks.length > 0) {
                addWeekSection(timeline, currentWeek, weekTasks);
            }

            updateProgress();
        }

        function addWeekSection(parent, week, weekTasks) {
            const section = document.createElement('div');
            section.className = 'week-section';
            section.innerHTML = `<div class="week-title">Week ${week}</div>`;

            weekTasks.forEach(task => {
                const taskEl = createTaskElement(task);
                section.appendChild(taskEl);
            });

            parent.appendChild(section);
        }

        function createTaskElement(task) {
            const taskId = task.actualDate + '_' + task.title;
            const isCompleted = completedTasks.includes(taskId);
            const taskEl = document.createElement('div');
            taskEl.className = 'task' + (isCompleted ? ' completed' : '');

            const taskDate = new Date(task.actualDate + 'T00:00:00');
            const dateStr = taskDate.toLocaleDateString('en-US', {month: 'short', day: 'numeric'});

            let statusHtml = `<div class="task-status type-${task.type}">${task.type}</div>`;

            let actionsHTML = `<button class="task-btn" onclick="toggleTask('${taskId.replace(/'/g, "\\'")}')">${isCompleted ? 'Undo ↩️' : 'Done ✓'}</button>`;

            if (task.content) {
                actionsHTML = `<button class="task-btn" onclick="showModal('${task.title.replace(/'/g, "\\'")}', '${task.description.replace(/'/g, "\\'")}', \`${task.content.replace(/`/g, '\\`')}\`, false, false)">📖 View</button>` + actionsHTML;
            } else if (task.isMetrics) {
                actionsHTML = `<button class="task-btn" onclick="showMetricsModal('${task.title.replace(/'/g, "\\'")}', '${task.description.replace(/'/g, "\\'")}')")>📊 Log</button>` + actionsHTML;
            } else if (task.isSpeaking) {
                actionsHTML = `<button class="task-btn" onclick="showSpeakingModal('${task.title.replace(/'/g, "\\'")}', '${task.description.replace(/'/g, "\\'")}')")>🎤 Log</button>` + actionsHTML;
            } else if (task.isMeeting) {
                actionsHTML = `<button class="task-btn" onclick="showMeetingModal('${task.title.replace(/'/g, "\\'")}', '${task.description.replace(/'/g, "\\'")}')")>👥 Log</button>` + actionsHTML;
            } else if (task.isBranding) {
                actionsHTML = `<button class="task-btn" onclick="showBrandingModal('${task.title.replace(/'/g, "\\'")}', '${task.description.replace(/'/g, "\\'")}')")>🎨 Log</button>` + actionsHTML;
            }

            taskEl.innerHTML = `
                <div class="task-header">
                    <div class="task-checkbox" onclick="toggleTask('${taskId.replace(/'/g, "\\'")}')">${isCompleted ? '✓' : ''}</div>
                    <div class="task-meta">
                        <div class="task-title">${task.title}</div>
                        <div class="task-date">${task.day} • ${dateStr}</div>
                    </div>
                    ${statusHtml}
                </div>
                <div class="task-content">
                    <div class="task-description">${task.description}</div>
                    <div class="task-actions">${actionsHTML}</div>
                </div>
            `;

            taskEl.addEventListener('click', (e) => {
                if (!e.target.closest('.task-btn') && !e.target.closest('.task-checkbox')) {
                    taskEl.classList.toggle('expanded');
                }
            });

            return taskEl;
        }

        function toggleTask(taskId) {
            if (completedTasks.includes(taskId)) {
                completedTasks = completedTasks.filter(id => id !== taskId);
            } else {
                completedTasks.push(taskId);
            }
            saveData();
            render();
        }

        function showModal(title, description, content, isMetrics, isMulti) {
            const modal = document.getElementById('modal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').textContent = description;
            document.getElementById('contentSection').classList.add('hidden');
            document.getElementById('metricsSection').classList.add('hidden');
            document.getElementById('speakingSection').classList.add('hidden');
            document.getElementById('meetingSection').classList.add('hidden');
            document.getElementById('brandingSection').classList.add('hidden');
            document.getElementById('copyBtn').classList.add('hidden');

            if (!isMetrics) {
                document.getElementById('contentSection').classList.remove('hidden');
                document.getElementById('contentTextarea').value = content;
                document.getElementById('copyBtn').classList.remove('hidden');
            }

            modal.classList.add('show');
        }

        function showMetricsModal(title, description) {

            document.getElementById('modalBody').textContent = description;
            document.getElementById('contentSection').classList.add('hidden');

            document.getElementById('speakingSection').classList.add('hidden');
            document.getElementById('meetingSection').classList.add('hidden');
            document.getElementById('brandingSection').classList.add('hidden');
            document.getElementById('copyBtn').classList.add('hidden');
            
            document.getElementById('metricsImpressions').value = '';
            document.getElementById('metricsLikes').value = '';
            document.getElementById('metricsComments').value = '';
            document.getElementById('metricsShares').value = '';
            document.getElementById('metricsFeedback').classList.add('hidden');
            
            modal.classList.add('show');
        }

        function showMeetingModal(title, description) {

            document.getElementById('contentSection').classList.add('hidden');

            document.getElementById('brandingSection').classList.add('hidden');

            document.getElementById('meetingName').value = '';

        function showBrandingModal(title, description) {
            const modal = document.getElementById('modal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').textContent = description;
            document.getElementById('contentSection').classList.add('hidden');
            document.getElementById('metricsSection').classList.add('hidden');
            document.getElementById('speakingSection').classList.add('hidden');
            document.getElementById('meetingSection').classList.add('hidden');
            document.getElementById('brandingSection').classList.remove('hidden');
            document.getElementById('copyBtn').classList.add('hidden');
            
            document.getElementById('brandingDetails').value = '';
            
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function copyContent() {
            const textarea = document.getElementById('contentTextarea');
            textarea.select();
            document.execCommand('copy');
            alert('✅ Copied!');
        }

        function calculateMetrics() {
            const impressions = parseInt(document.getElementById('metricsImpressions').value) || 0;
            const likes = parseInt(document.getElementById('metricsLikes').value) || 0;
            const comments = parseInt(document.getElementById('metricsComments').value) || 0;
            const shares = parseInt(document.getElementById('metricsShares').value) || 0;

            const feedback = document.getElementById('metricsFeedback');
            let message = '';
            let cssClass = '';

            if (impressions === 0) {
                message = '⏳ No impressions yet. Check again later.';
                cssClass = 'warning';
            } else {
                const engagement = ((likes + comments + shares) / impressions * 100).toFixed(2);
                
                if (engagement >= 3) {
                    message = `🔥 Great engagement! ${engagement}% - Keep this momentum!`;
                    cssClass = '';
                } else if (engagement >= 1.5) {
                    message = `✅ Good engagement: ${engagement}% - This is solid.`;
                    cssClass = '';
                } else if (engagement >= 0.5) {
                    message = `⚠️ Moderate: ${engagement}% - Try different topics.`;
                    cssClass = 'warning';
                } else {
                    message = `📊 Low: ${engagement}% - Try different timing.`;
                    cssClass = 'warning';
                }
            }

            feedback.textContent = message;
            feedback.className = 'metrics-feedback ' + cssClass;
            feedback.classList.remove('hidden');
        }

        function saveSpeakingData() {
            const data = {
                event: document.getElementById('speakingEvent').value,
                topic: document.getElementById('speakingTopic').value,
                link: document.getElementById('speakingLink').value,
                notes: document.getElementById('speakingNotes').value
            };
            savedData.speaking = savedData.speaking || [];
            savedData.speaking.push(data);
            saveData();
            alert('✅ Speaking event logged!');
            closeModal();
        }

        function saveMeetingData() {
            const data = {
                name: document.getElementById('meetingName').value,
                company: document.getElementById('meetingCompany').value,
                topics: document.getElementById('meetingTopics').value
            };
            savedData.meetings = savedData.meetings || [];
            savedData.meetings.push(data);
            saveData();
            alert('✅ Meeting logged!');
            closeModal();
        }

        function saveBrandingData() {
            const data = {
                details: document.getElementById('brandingDetails').value
            };
            savedData.branding = savedData.branding || [];
            savedData.branding.push(data);
            saveData();
            alert('✅ Branding task saved!');
            closeModal();
        }

        function updateProgress() {
            const total = tasks.length;
            const completed = completedTasks.length;
            const percentage = total > 0 ? (completed / total) * 100 : 0;

            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `${completed} of ${total} tasks completed`;
        }

        document.getElementById('startDate').addEventListener('change', updateTimeline);
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        loadData();
    </script>
